name: Deploy Cloudflare

on:
  workflow_dispatch:
    inputs:
      environment:
        description: GitHub Environment containing isolated Cloudflare variables and secrets
        required: true
        type: choice
        options:
          - development
          - staging
          - production
      mode:
        description: Validate only or deploy API and web
        required: true
        default: plan
        type: choice
        options:
          - plan
          - deploy

permissions:
  contents: read
  deployments: write

concurrency:
  group: cloudflare-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  deploy:
    name: ${{ inputs.mode }} ${{ inputs.environment }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: ${{ inputs.environment }}
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CF_ENVIRONMENT: ${{ inputs.environment }}
      CF_WORKER_NAME: ${{ vars.CF_WORKER_NAME }}
      CF_PAGES_PROJECT_NAME: ${{ vars.CF_PAGES_PROJECT_NAME }}
      CF_D1_DATABASE_NAME: ${{ vars.CF_D1_DATABASE_NAME }}
      CF_D1_DATABASE_ID: ${{ vars.CF_D1_DATABASE_ID }}
      CF_TENANT_D1_DATABASE_NAME: ${{ vars.CF_TENANT_D1_DATABASE_NAME }}
      CF_TENANT_D1_DATABASE_ID: ${{ vars.CF_TENANT_D1_DATABASE_ID }}
      CF_KV_NAMESPACE_ID: ${{ vars.CF_KV_NAMESPACE_ID }}
      CF_R2_BUCKET_NAME: ${{ vars.CF_R2_BUCKET_NAME }}
      CF_OUTBOX_QUEUE_NAME: ${{ vars.CF_OUTBOX_QUEUE_NAME }}
      CF_OUTBOX_DLQ_NAME: ${{ vars.CF_OUTBOX_DLQ_NAME }}
      CF_CORS_ORIGINS: ${{ vars.CF_CORS_ORIGINS }}
      CF_OIDC_ISSUER: ${{ vars.CF_OIDC_ISSUER }}
      CF_OIDC_AUDIENCE: ${{ vars.CF_OIDC_AUDIENCE }}
      CF_OIDC_JWKS_URI: ${{ vars.CF_OIDC_JWKS_URI }}
      CF_OIDC_ALGORITHMS: ${{ vars.CF_OIDC_ALGORITHMS }}
      CF_SELF_SERVICE_ONBOARDING: ${{ vars.CF_SELF_SERVICE_ONBOARDING }}
      CF_WORKERS_DEV: ${{ vars.CF_WORKERS_DEV }}
      CF_API_ROUTE_PATTERN: ${{ vars.CF_API_ROUTE_PATTERN }}
      CF_API_ROUTE_ZONE: ${{ vars.CF_API_ROUTE_ZONE }}
      CF_API_BASE_URL: ${{ vars.CF_API_BASE_URL }}
      CF_WEB_BASE_URL: ${{ vars.CF_WEB_BASE_URL }}
      CF_APP_VERSION: ${{ github.sha }}
      CF_SMOKE_BEARER_TOKEN: ${{ secrets.CF_SMOKE_BEARER_TOKEN }}
      CF_SMOKE_TENANT_ID: ${{ secrets.CF_SMOKE_TENANT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Enable Corepack
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Verify repository
        run: pnpm typecheck && pnpm test && pnpm build

      - name: Validate deployment credentials
        shell: bash
        run: |
          set -euo pipefail
          test -n "$CLOUDFLARE_ACCOUNT_ID" || { echo 'CLOUDFLARE_ACCOUNT_ID is not configured.' >&2; exit 1; }
          test -n "$CLOUDFLARE_API_TOKEN" || { echo 'CLOUDFLARE_API_TOKEN is not configured.' >&2; exit 1; }
          test -n "$CF_PAGES_PROJECT_NAME" || { echo 'CF_PAGES_PROJECT_NAME is not configured.' >&2; exit 1; }
          test -n "$CF_TENANT_D1_DATABASE_NAME" || { echo 'CF_TENANT_D1_DATABASE_NAME is not configured.' >&2; exit 1; }
          test -n "$CF_TENANT_D1_DATABASE_ID" || { echo 'CF_TENANT_D1_DATABASE_ID is not configured.' >&2; exit 1; }
          test -n "$CF_API_BASE_URL" || { echo 'CF_API_BASE_URL is not configured.' >&2; exit 1; }
          test -n "$CF_WEB_BASE_URL" || { echo 'CF_WEB_BASE_URL is not configured.' >&2; exit 1; }

      - name: Render fail-closed Wrangler configuration
        run: node scripts/render-cloudflare-config.mjs

      - name: Write ephemeral Worker secrets file
        shell: bash
        env:
          INVITATION_ENCRYPTION_KEY: ${{ secrets.INVITATION_ENCRYPTION_KEY }}
        run: |
          set -euo pipefail
          test -n "$INVITATION_ENCRYPTION_KEY" || { echo 'INVITATION_ENCRYPTION_KEY is not configured.' >&2; exit 1; }
          umask 077
          node -e "require('node:fs').writeFileSync(process.env.RUNNER_TEMP + '/worker-secrets.json', JSON.stringify({INVITATION_ENCRYPTION_KEY: process.env.INVITATION_ENCRYPTION_KEY}))"

      - name: Dry-run Worker deployment
        working-directory: apps/api
        run: pnpm exec wrangler deploy --dry-run --config wrangler.generated.json --secrets-file "$RUNNER_TEMP/worker-secrets.json"

      - name: Build web application
        run: pnpm --filter @fmcgbyalex/web build

      - name: Render Pages security policy
        run: node scripts/render-pages-security.mjs

      - name: Upload deployment plan
        if: inputs.mode == 'plan'
        uses: actions/upload-artifact@v4
        with:
          name: cloudflare-plan-${{ inputs.environment }}
          path: |
            apps/api/wrangler.generated.json
            apps/web/dist
          retention-days: 7

      - name: Apply control-plane D1 migrations
        if: inputs.mode == 'deploy'
        working-directory: apps/api
        run: pnpm exec wrangler d1 migrations apply CONTROL_DB --remote --config wrangler.generated.json

      - name: Apply tenant data-plane D1 migrations
        if: inputs.mode == 'deploy'
        working-directory: apps/api
        run: pnpm exec wrangler d1 migrations apply TENANT_DB --remote --config wrangler.generated.json

      - name: Deploy API Worker
        if: inputs.mode == 'deploy'
        working-directory: apps/api
        run: pnpm exec wrangler deploy --config wrangler.generated.json --secrets-file "$RUNNER_TEMP/worker-secrets.json"

      - name: Deploy web to Cloudflare Pages
        if: inputs.mode == 'deploy'
        run: >-
          pnpm --dir apps/api exec wrangler pages deploy "$GITHUB_WORKSPACE/apps/web/dist"
          --project-name="$CF_PAGES_PROJECT_NAME"
          --branch="${{ inputs.environment == 'production' && 'main' || format('environment/{0}', inputs.environment) }}"
          --commit-hash="${{ github.sha }}"
          --commit-message="Deploy ${{ github.sha }}"
          --commit-dirty=false

      - name: Smoke test deployed environment
        if: inputs.mode == 'deploy'
        run: node scripts/cloudflare-smoke.mjs

      - name: Remove ephemeral secrets
        if: always()
        run: rm -f "$RUNNER_TEMP/worker-secrets.json"

      - name: Deployment summary
        if: always()
        shell: bash
        run: |
          {
            echo '## Cloudflare deployment'
            echo
            echo "- Environment: $CF_ENVIRONMENT"
            echo "- Mode: ${{ inputs.mode }}"
            echo "- Commit: ${{ github.sha }}"
            echo "- Worker: $CF_WORKER_NAME"
            echo "- Control D1: $CF_D1_DATABASE_NAME"
            echo "- Tenant D1: $CF_TENANT_D1_DATABASE_NAME"
            echo "- Pages project: $CF_PAGES_PROJECT_NAME"
            echo "- API: $CF_API_BASE_URL"
            echo "- Web: $CF_WEB_BASE_URL"
          } >> "$GITHUB_STEP_SUMMARY"
